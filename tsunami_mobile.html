<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>🌊 Tsunami Escape</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap');
:root{--gold:#ffd700;--green:#00ff88;--red:#ff4757;--bg:#050814;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  width:100%;height:100%;
  background:var(--bg);
  overflow:hidden;
  font-family:'Nunito',sans-serif;
  touch-action:none;
}
#wrap{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
/* HUD */
#hud{
  width:100%;max-width:600px;
  display:flex;justify-content:space-around;align-items:center;
  padding:4px 8px;
  background:rgba(0,0,0,0.75);
  border-bottom:2px solid rgba(0,198,255,0.2);
  flex-shrink:0;
}
.hb{display:flex;flex-direction:column;align-items:center;}
.hl{font-size:7px;font-weight:800;letter-spacing:1.2px;color:rgba(255,255,255,0.3);text-transform:uppercase;}
.hv{font-family:'Fredoka One',cursive;font-size:1.1rem;line-height:1.1;}
#dangerBar{width:100%;max-width:600px;height:6px;background:rgba(0,0,0,0.5);flex-shrink:0;}
#dangerFill{height:100%;width:0%;background:linear-gradient(90deg,#00ff88,#ffff00,#ff6b00,#ff0000);transition:width .12s;}
/* Canvas wrapper — fills remaining space */
#cWrap{
  position:relative;
  flex:1;
  width:100%;max-width:600px;
  overflow:hidden;
}
canvas{
  display:block;
  width:100%;height:100%;
}
/* Touch controls — drawn on canvas overlay */
#tctrl{
  position:absolute;
  inset:0;
  pointer-events:none;
}
.tbtn{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
  border:2px solid rgba(255,255,255,0.22);
  pointer-events:all;
  touch-action:none;
  display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;
  color:rgba(255,255,255,0.55);
  user-select:none;
  transition:background .08s;
}
.tbtn.active{background:rgba(255,255,255,0.28);}
#tLeft {bottom:18px;left:14px;width:68px;height:68px;}
#tRight{bottom:18px;left:94px;width:68px;height:68px;}
#tJump {bottom:18px;right:14px;width:78px;height:78px;font-size:1.9rem;}
/* overlay */
#overlay{
  position:absolute;inset:0;
  background:rgba(2,6,22,0.92);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:12px;z-index:100;
  backdrop-filter:blur(12px);
}
#overlay.off{display:none;}
.oi{font-size:4rem;animation:ob 1.1s ease-in-out infinite alternate;}
@keyframes ob{from{transform:translateY(0)}to{transform:translateY(-10px) scale(1.07)}}
.ot{font-family:'Fredoka One',cursive;font-size:2.5rem;text-align:center;line-height:1.1;}
.ot.blue{background:linear-gradient(135deg,#00c6ff,#fff,#00ff88);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 16px rgba(0,198,255,.5));}
.ot.red{background:linear-gradient(135deg,#ff4757,#ffa502,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 16px rgba(255,50,50,.5));}
.os{color:rgba(255,255,255,.6);font-size:.88rem;text-align:center;max-width:300px;line-height:1.55;}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:6px;width:290px;}
.sb{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:9px;padding:6px 12px;}
.sl{font-size:.58rem;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.28);}
.sv{font-family:'Fredoka One',cursive;font-size:1.25rem;}
.btn{font-family:'Fredoka One',cursive;font-size:1.2rem;padding:12px 40px;border:none;border-radius:50px;cursor:pointer;letter-spacing:1px;transition:transform .12s,box-shadow .12s;position:relative;overflow:hidden;}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.18),transparent);border-radius:50px;}
.bp{background:linear-gradient(135deg,#00c6ff,#0072ff);color:#fff;box-shadow:0 5px 28px rgba(0,114,255,.5);animation:bg2 2s ease-in-out infinite;}
@keyframes bg2{0%,100%{box-shadow:0 5px 28px rgba(0,114,255,.5)}50%{box-shadow:0 8px 38px rgba(0,114,255,.75)}}
.br{background:linear-gradient(135deg,#ff4757,#ff2240);color:#fff;box-shadow:0 5px 28px rgba(255,50,80,.5);}
.btn:active{transform:scale(0.95);}
.rec{font-family:'Fredoka One',cursive;color:var(--gold);font-size:.95rem;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);padding:3px 14px;border-radius:20px;animation:rp 1s ease-in-out infinite;}
@keyframes rp{0%,100%{box-shadow:none}50%{box-shadow:0 0 16px rgba(255,215,0,.4)}}
/* powerup badge */
#pwrBadge{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  font-family:'Fredoka One',cursive;font-size:.75rem;color:var(--gold);
  background:rgba(255,215,0,.12);border:1px solid rgba(255,215,0,.28);
  padding:2px 10px;border-radius:12px;display:none;z-index:10;
}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div class="hb"><div class="hl">Score</div><div class="hv" style="color:var(--gold)" id="hs">0</div></div>
    <div class="hb"><div class="hl">Hauteur</div><div class="hv" style="color:var(--green)" id="hh">0m</div></div>
    <div class="hb"><div class="hl">Meilleur</div><div class="hv" style="color:#c084fc" id="hb2">0</div></div>
    <div class="hb"><div class="hl">Temps</div><div class="hv" style="color:#ff9f43" id="ht">0s</div></div>
    <div class="hb"><div class="hl">Vies</div><div class="hv" id="hlv">❤️❤️❤️</div></div>
  </div>
  <div id="dangerBar"><div id="dangerFill"></div></div>
  <div id="cWrap">
    <canvas id="c"></canvas>
    <div id="tctrl">
      <div class="tbtn" id="tLeft">◀</div>
      <div class="tbtn" id="tRight">▶</div>
      <div class="tbtn" id="tJump">▲</div>
    </div>
    <div id="pwrBadge">—</div>
    <div id="overlay">
      <div class="oi">🌊</div>
      <div class="ot blue">TSUNAMI ESCAPE</div>
      <div class="os">Le tsunami monte vite!<br>Grimpe, collecte des gemmes 💎<br>et des powerups ⚡🦘🛡</div>
      <button class="btn bp" id="mainBtn">▶ &nbsp;JOUER</button>
    </div>
  </div>
</div>
<script>
// ═══════════════════════════════════
//  TSUNAMI ESCAPE — VERSION MOBILE
// ═══════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Responsive canvas sizing
let W, H, SCALE;
function resize(){
  const wrap = document.getElementById('cWrap');
  const rect = wrap.getBoundingClientRect();
  W = Math.round(rect.width);
  H = Math.round(rect.height);
  canvas.width = W;
  canvas.height = H;
  SCALE = W / 600; // scale factor relative to design width
}
resize();
window.addEventListener('resize', ()=>{ resize(); if(G&&G.state==='playing') G.start(); });

// ── AUDIO ─────────────────────────
const AC = new (window.AudioContext||window.webkitAudioContext)();
function beep(f1,f2,dur,type,vol){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    const t=AC.currentTime;
    o.type=type||'square';
    o.frequency.setValueAtTime(f1,t);
    if(f2) o.frequency.exponentialRampToValueAtTime(f2,t+dur);
    g.gain.setValueAtTime(vol||.08,t);
    g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.start(t);o.stop(t+dur+.01);
  }catch(e){}
}
function snd(n){
  if(n==='jump')   beep(280,560,.12,'square',.1);
  if(n==='djump')  beep(380,800,.14,'square',.09);
  if(n==='land')   beep(140,70,.07,'sine',.07);
  if(n==='gem')    beep(880,1760,.15,'sine',.12);
  if(n==='pwr')    beep(440,1760,.3,'sawtooth',.09);
  if(n==='warn')   beep(200,400,.15,'square',.05);
  if(n==='die')    beep(380,80,.55,'sawtooth',.12);
  if(n==='spring') beep(320,1200,.18,'sine',.11);
}

// ── UTILS ─────────────────────────
const rnd=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const lerp=(a,b,t)=>a+(b-a)*t;

// ── PHYSICS (design units = 600px wide) ────
// All positions in DESIGN space, drawn scaled
const GRAV=.48, JUMP_SPD=12.8, DJUMP_SPD=11.2, WALK_SPD=4.6;
const DW=600; // design width
let DH=500;   // design height (recalculated on resize)

// Camera
let camY=0; // design-space world Y at top of canvas
const sY=wy=>wy-camY;

// ── PARTICLES ─────────────────────
const parts=[];
function spawnParts(x,y,color,n,o={}){
  for(let i=0;i<n;i++){
    const a=rnd(0,Math.PI*2),spd=rnd(o.mn||1,o.mx||4);
    parts.push({x:x+rnd(-4,4),y:y+rnd(-4,4),vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-(o.up||0),
      color,sz:rnd(2,o.sz||5),life:rnd(18,o.life||38),ml:0});
  }
  parts.forEach(p=>{ if(!p.ml) p.ml=p.life; });
}
function tickParts(){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=.2;p.vx*=.97;p.life--;
    if(p.life<=0){parts.splice(i,1);continue;}
    ctx.globalAlpha=p.life/p.ml;
    ctx.fillStyle=p.color;
    ctx.shadowColor=p.color;ctx.shadowBlur=4;
    ctx.beginPath();ctx.arc(p.x*SCALE,p.y*SCALE,p.sz*(p.life/p.ml)*SCALE,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;
}

// ── PLATFORM ──────────────────────
const PCOLORS={normal:'#3ddc84',moving:'#ff9f43',spring:'#ff6b9d',ice:'#74b9ff',crumble:'#fdcb6e'};
class Plat{
  constructor(x,wy,w,type='normal'){
    this.x=x;this.wy=wy;this.w=w;this.h=14;
    this.type=type;this.color=PCOLORS[type]||'#3ddc84';
    this.ox=x;this.spd=rnd(.9,2)*( Math.random()<.5?1:-1);
    this.phase=rnd(0,Math.PI*2);this.range=rnd(70,160);
    this.crumble=false;this.ct=0;this.dead=false;
  }
  update(){
    if(this.type==='moving'){
      this.x=this.ox+Math.sin(performance.now()/1000*Math.abs(this.spd)+this.phase)*this.range;
      this.x=clamp(this.x,10,DW-this.w-10);
    }
    if(this.crumble){this.ct++;if(this.ct>45)this.dead=true;}
  }
  draw(){
    if(this.dead)return;
    const sy_=sY(this.wy);
    if(sy_<-20||sy_>DH+20)return;
    const s=SCALE, alpha=this.crumble?1-this.ct/45:1;
    ctx.globalAlpha=alpha;
    const dx=this.crumble?rnd(-2,2):0;
    ctx.fillStyle='rgba(0,0,0,.25)';
    ctx.beginPath();ctx.ellipse((this.x+this.w/2+dx)*s,(sy_+this.h+5)*s,this.w*.42*s,5*s,0,0,Math.PI*2);ctx.fill();
    ctx.shadowColor=this.color;ctx.shadowBlur=8;
    ctx.beginPath();ctx.roundRect((this.x+dx)*s,sy_*s,this.w*s,this.h*s,7*s);
    ctx.fillStyle=this.color;ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,.28)';
    ctx.beginPath();ctx.roundRect((this.x+dx+4)*s,(sy_+2)*s,(this.w-8)*s,4*s,2*s);ctx.fill();
    if(this.type==='moving'){
      ctx.fillStyle='rgba(255,255,255,.45)';ctx.font=`${9*s}px Nunito`;ctx.textAlign='center';
      ctx.fillText('↔',(this.x+dx+this.w/2)*s,(sy_+11)*s);ctx.textAlign='left';
    }
    if(this.type==='spring'){
      ctx.fillStyle='#e84393';
      for(let i=0;i<3;i++)ctx.fillRect((this.x+dx+this.w/2-6+i*5)*s,(sy_-8+i*2)*s,4*s,8*s);
    }
    if(this.type==='ice'){
      ctx.fillStyle='rgba(255,255,255,.5)';
      ctx.beginPath();ctx.roundRect((this.x+dx+5)*s,(sy_+3)*s,(this.w/3)*s,3*s,2*s);ctx.fill();
    }
    if(this.type==='crumble'){
      ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1.5*s;
      ctx.beginPath();
      ctx.moveTo((this.x+dx+8)*s,sy_*s);ctx.lineTo((this.x+dx+18)*s,(sy_+this.h)*s);
      ctx.moveTo((this.x+dx+this.w-12)*s,sy_*s);ctx.lineTo((this.x+dx+this.w-4)*s,(sy_+this.h)*s);
      ctx.stroke();
    }
    ctx.globalAlpha=1;
  }
}

// ── GEM ───────────────────────────
class Gem{
  constructor(x,wy,type='gem'){
    this.x=x;this.wy=wy;this.type=type;
    this.done=false;this.bob=rnd(0,Math.PI*2);this.rot=0;
  }
  get sx(){return this.x;}
  get sy_(){return sY(this.wy)+Math.sin(performance.now()/620+this.bob)*5;}
  update(){this.rot+=.05;}
  draw(){
    if(this.done)return;
    const x=this.sx,y=this.sy_;
    if(y<-30||y>DH+30)return;
    const s=SCALE;
    ctx.save();ctx.translate(x*s,y*s);ctx.scale(s,s);
    if(this.type==='gem'){
      ctx.shadowColor='#00d4ff';ctx.shadowBlur=14;ctx.rotate(this.rot*.4);ctx.fillStyle='#00d4ff';
      ctx.beginPath();ctx.moveTo(0,-11);ctx.lineTo(8,-4);ctx.lineTo(8,4);
      ctx.lineTo(0,11);ctx.lineTo(-8,4);ctx.lineTo(-8,-4);ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.45)';
      ctx.beginPath();ctx.moveTo(0,-11);ctx.lineTo(4,-4);ctx.lineTo(0,-2);ctx.closePath();ctx.fill();
    }else if(this.type==='pwr_speed'){
      ctx.shadowColor='#ffff00';ctx.shadowBlur=18;ctx.fillStyle='#ffff00';
      ctx.beginPath();ctx.moveTo(4,-11);ctx.lineTo(-3,1);ctx.lineTo(2,1);
      ctx.lineTo(-4,11);ctx.lineTo(3,-1);ctx.lineTo(-2,-1);ctx.closePath();ctx.fill();
    }else if(this.type==='pwr_jump'){
      ctx.shadowColor='#ff88ff';ctx.shadowBlur=18;ctx.fillStyle='#ff88ff';
      ctx.beginPath();ctx.moveTo(0,-12);ctx.lineTo(7,-1);ctx.lineTo(4,-1);
      ctx.lineTo(4,10);ctx.lineTo(-4,10);ctx.lineTo(-4,-1);ctx.lineTo(-7,-1);ctx.closePath();ctx.fill();
    }else if(this.type==='pwr_shield'){
      ctx.shadowColor='#00ff88';ctx.shadowBlur=18;ctx.fillStyle='#00ff88';
      ctx.beginPath();ctx.moveTo(0,-12);ctx.lineTo(9,-6);ctx.lineTo(9,3);
      ctx.lineTo(0,12);ctx.lineTo(-9,3);ctx.lineTo(-9,-6);ctx.closePath();ctx.fill();
    }
    ctx.shadowBlur=0;ctx.restore();
  }
}

// ── BUILDINGS ─────────────────────
const BLDGS=[];
function genBuildings(){
  const pal=['#0d1117','#111827','#1a1a3a','#0f172a'];
  for(let i=0;i<14;i++){
    const bw=rnd(35,85),bh=rnd(100,280);
    const b={x:rnd(-20,DW-20),wy:rnd(-500,500),w:bw,bh,color:pal[Math.floor(Math.random()*pal.length)],wins:[]};
    const cols=Math.floor(bw/18),rows=Math.floor(bh/22);
    for(let c=0;c<cols;c++)for(let r=0;r<rows;r++)b.wins.push({x:4+c*18,y:6+r*22,lit:Math.random()<.55});
    BLDGS.push(b);
  }
}
function drawBuildings(){
  const now=performance.now()/1200,s=SCALE;
  for(const b of BLDGS){
    const ty=sY(b.wy);
    if(ty>DH+10||ty-b.bh<-10)continue;
    ctx.globalAlpha=.35;ctx.fillStyle=b.color;
    ctx.fillRect(b.x*s,(ty-b.bh)*s,b.w*s,b.bh*s);
    for(const w of b.wins){
      ctx.fillStyle=w.lit?`rgba(255,240,100,${.22+Math.sin(now+w.x)*.07})`:'rgba(30,40,60,.4)';
      ctx.fillRect((b.x+w.x)*s,(ty-b.bh+w.y)*s,7*s,9*s);
    }
    ctx.globalAlpha=1;
  }
}

// ── STARS ─────────────────────────
const STARS=[];
for(let i=0;i<110;i++)STARS.push({x:rnd(0,DW),y:rnd(0,500),s:rnd(.5,1.8),ph:rnd(0,6.28)});
function drawStars(a){
  if(a<=0)return;
  const now=performance.now()/1000,s=SCALE;
  for(const st of STARS){
    ctx.globalAlpha=clamp(a,0,1)*.8*(0.4+0.6*Math.abs(Math.sin(now*.4+st.ph)));
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(st.x*s,st.y*s,st.s*s,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ── BACKGROUND ────────────────────
function drawBg(depth){
  DH=DW*H/W; // update design height
  const t=clamp(depth/1500,0,1);
  const r=Math.round(lerp(8,3,t)),g2=Math.round(lerp(18,6,t)),b=Math.round(lerp(50,12,t));
  const gr=ctx.createLinearGradient(0,0,0,H);
  gr.addColorStop(0,`rgb(${r},${g2},${b})`);
  gr.addColorStop(1,`rgb(${Math.round(r*.6)},${Math.round(g2*.5)},${Math.round(b*.4)})`);
  ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);
  drawStars(clamp(depth/400,0,1));
  if(depth>300){
    const ma=clamp((depth-300)/500,0,.85),s=SCALE;
    ctx.globalAlpha=ma;ctx.fillStyle='#fffde8';ctx.shadowColor='#fffde8';ctx.shadowBlur=18;
    ctx.beginPath();ctx.arc(510*s,55*s,26*s,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#050814';ctx.shadowBlur=0;
    ctx.beginPath();ctx.arc(524*s,49*s,22*s,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  drawBuildings();
  if(camY<200){
    const gy=sY(0),s=SCALE;
    if(gy>0&&gy<DH){
      const gg=ctx.createLinearGradient(0,gy*s,0,(gy+55)*s);
      gg.addColorStop(0,'rgba(30,180,70,.9)');gg.addColorStop(.08,'rgba(20,100,40,.95)');gg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gg;ctx.fillRect(0,gy*s,W,55*s);
      ctx.fillStyle='#374151';ctx.fillRect(0,(gy+18)*s,W,14*s);
      ctx.fillStyle='#fbbf24';
      for(let i=50;i<DW;i+=80)ctx.fillRect(i*s,(gy+23)*s,28*s,4*s);
    }
  }
}

// ── TSUNAMI ───────────────────────
const TS={
  wy:400,spd:1.1,wt:0,foam:[],bubbles:[],
  reset(){
    this.wy=50+350;this.spd=1.1;this.wt=0;this.foam=[];this.bubbles=[];
    for(let i=0;i<18;i++)this.bubbles.push({x:rnd(0,DW),wy:this.wy+rnd(20,250),r:rnd(2,5),sp:rnd(.3,.8)});
  },
  update(dt,el){
    this.spd=1.1+el*.055+Math.sin(el*.4)*.15;
    this.wt+=dt*.035;this.wy-=this.spd*dt;
    if(Math.random()<.35)this.foam.push({x:rnd(0,DW),wy:this.wy+rnd(-6,3),sz:rnd(4,11),life:rnd(18,55),ml:55,vx:rnd(-1,1)});
    this.foam=this.foam.filter(f=>{f.x+=f.vx;f.life--;return f.life>0;});
    for(const b of this.bubbles){b.wy-=b.sp*dt;if(b.wy<this.wy-5){b.wy=this.wy+rnd(50,280);b.x=rnd(0,DW);}}
  },
  draw(){
    const t=this.wt,topY=sY(this.wy),s=SCALE;
    if(topY>DH+50)return;
    for(const b of this.bubbles){
      const by=sY(b.wy);if(by<topY)continue;
      ctx.globalAlpha=.25;ctx.strokeStyle='rgba(150,220,255,.5)';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(b.x*s,by*s,b.r*s,0,Math.PI*2);ctx.stroke();
    }
    ctx.globalAlpha=1;
    // main wave
    ctx.beginPath();ctx.moveTo(0,topY*s);
    for(let x=0;x<=DW;x+=4){
      const wave=Math.sin(x*.018+t)*15+Math.sin(x*.038-t*1.35)*8+Math.sin(x*.007+t*.6)*22;
      ctx.lineTo(x*s,(topY+wave)*s);
    }
    ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
    const wg=ctx.createLinearGradient(0,(topY-8)*s,0,H);
    wg.addColorStop(0,'rgba(0,230,255,.94)');wg.addColorStop(.06,'rgba(0,145,225,.9)');
    wg.addColorStop(.22,'rgba(0,75,195,.88)');wg.addColorStop(.55,'rgba(0,38,155,.92)');wg.addColorStop(1,'rgba(0,8,70,.97)');
    ctx.fillStyle=wg;ctx.shadowColor='#00aaff';ctx.shadowBlur=18;ctx.fill();ctx.shadowBlur=0;
    // second layer
    ctx.beginPath();ctx.moveTo(0,(topY+6)*s);
    for(let x=0;x<=DW;x+=4){const wave=Math.sin(x*.022-t*1.1)*9+Math.sin(x*.046+t)*5;ctx.lineTo(x*s,(topY+wave+6)*s);}
    ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fillStyle='rgba(0,180,255,.18)';ctx.fill();
    // foam dots
    for(const f of this.foam){
      const fy=sY(f.wy);
      ctx.globalAlpha=(f.life/f.ml)*.65;ctx.fillStyle='#ddf4ff';ctx.shadowColor='#fff';ctx.shadowBlur=3;
      ctx.beginPath();ctx.arc(f.x*s,fy*s,f.sz*s,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    }
    ctx.globalAlpha=1;
    // crest strip
    ctx.beginPath();ctx.moveTo(0,topY*s);
    for(let x=0;x<=DW;x+=4){const wave=Math.sin(x*.018+t)*15+Math.sin(x*.038-t*1.35)*8+Math.sin(x*.007+t*.6)*22;ctx.lineTo(x*s,(topY+wave)*s);}
    for(let x=DW;x>=0;x-=4){const wave=Math.sin(x*.018+t)*15+Math.sin(x*.038-t*1.35)*8+Math.sin(x*.007+t*.6)*22;ctx.lineTo(x*s,(topY+wave+10+Math.random()*2)*s);}
    ctx.closePath();ctx.fillStyle='rgba(220,248,255,.42)';ctx.fill();
  },
  danger(py){return clamp(1-(py-this.wy)/220,0,1);}
};

// ── PLAYER ────────────────────────
const PL={
  x:286,wy:50,vx:0,vy:0,w:28,h:36,
  onGround:false,prevOG:false,jumps:0,maxJumps:2,
  right:true,sqsh:1,sqshV:0,aFr:0,aTm:0,
  pwr:null,pwrT:0,shielded:false,lives:3,ifr:0,
  reset(){
    this.x=286;this.wy=50;this.vx=0;this.vy=0;
    this.onGround=false;this.jumps=0;this.sqsh=1;this.sqshV=0;
    this.pwr=null;this.pwrT=0;this.shielded=false;this.lives=3;this.ifr=0;this.right=true;
  },
  jump(){
    if(this.jumps>=this.maxJumps)return false;
    this.vy=this.jumps===0?-(this.pwr==='jump'?JUMP_SPD*1.3:JUMP_SPD):-(this.pwr==='jump'?DJUMP_SPD*1.3:DJUMP_SPD);
    this.jumps++;this.sqsh=1.55;this.sqshV=0;
    spawnParts(this.x+this.w/2,sY(this.wy)+this.h,'#fff',8,{up:1,sz:4,life:25});
    snd(this.jumps===1?'jump':'djump');return true;
  },
  update(dt){
    this.aTm+=dt;if(this.aTm>1){this.aFr++;this.aTm=0;}
    this.sqshV+=(1-this.sqsh)*.28;this.sqshV*=.72;this.sqsh+=this.sqshV;
    if(this.pwr){this.pwrT-=dt;if(this.pwrT<=0){this.pwr=null;this.shielded=false;document.getElementById('pwrBadge').style.display='none';}}
    if(this.ifr>0)this.ifr-=dt;
    const spd=this.pwr==='speed'?WALK_SPD*1.75:WALK_SPD;
    this.vx=(keys.L?-1:keys.R?1:0)*spd;
    if(this.vx>0)this.right=true;if(this.vx<0)this.right=false;
    const gm=this.pwr==='jump'?.72:1;
    this.vy+=GRAV*gm*dt;this.vy=clamp(this.vy,-20,18);
    this.x+=this.vx*dt;this.wy+=this.vy*dt;
    if(this.x+this.w<0)this.x=DW;else if(this.x>DW)this.x=-this.w;
    this.prevOG=this.onGround;this.onGround=false;
    this.collide();
    if(!this.prevOG&&this.onGround){this.sqsh=0.52;this.sqshV=0;snd('land');}
  },
  collide(){
    for(const p of G.plats){
      if(p.dead)continue;
      if(this.x+this.w<=p.x||this.x>=p.x+p.w)continue;
      const feet=this.wy+this.h,prev=feet-this.vy;
      if(this.vy>0&&prev<=p.wy+2&&feet>=p.wy-2){
        this.wy=p.wy-this.h;this.vy=0;this.onGround=true;this.jumps=0;
        if(p.type==='spring'){
          this.vy=-(this.pwr==='jump'?JUMP_SPD*1.7:JUMP_SPD*1.55);this.jumps=0;this.sqsh=.3;
          spawnParts(this.x+this.w/2,sY(this.wy+this.h),'#ff6b9d',14,{up:3,mx:6,sz:6,life:30});snd('spring');
        }
        if(p.type==='crumble'&&!p.crumble)p.crumble=true;
        if(p.type==='ice')this.vx*=.82;
        break;
      }
    }
  },
  draw(){
    const px=this.x,py=sY(this.wy),s=SCALE;
    ctx.save();
    ctx.translate((px+this.w/2)*s,(py+this.h/2)*s);
    if(!this.right)ctx.scale(-1,1);
    ctx.scale((2-this.sqsh)*s,this.sqsh*s);
    if(this.ifr>0&&Math.floor(this.ifr/4)%2===1)ctx.globalAlpha=.45;
    if(this.shielded){
      ctx.shadowColor='#00ff88';ctx.shadowBlur=18;ctx.strokeStyle='rgba(0,255,136,.35)';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(0,0,21,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;
    }
    const bw=this.w,bh=this.h;
    if(this.pwr==='speed'){ctx.fillStyle='rgba(255,255,0,.13)';for(let i=1;i<=3;i++)ctx.fillRect(-bw/2-i*6,-bh/2,bw,bh);}
    // legs
    const lsw=this.onGround&&this.vx!==0?Math.sin(this.aFr*.4)*7:0;
    ctx.fillStyle='#1a1a2e';
    ctx.fillRect(-bw/2,bh/4-2,bw/2-2,bh/2+lsw);
    ctx.fillRect(2,bh/4-2,bw/2-2,bh/2-lsw);
    const tc=this.pwr==='speed'?'#ffff44':this.pwr==='jump'?'#ff88ff':this.shielded?'#44ff88':'#e84347';
    ctx.fillStyle=tc;ctx.shadowColor=tc;ctx.shadowBlur=7;
    ctx.beginPath();ctx.roundRect(-bw/2,-bh/2,bw,bh*.75,5);ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(-bw/2+3,-bh/2+4,bw-6,3);
    const asw=this.onGround&&this.vx!==0?Math.sin(this.aFr*.4+Math.PI)*5:0;
    ctx.fillStyle=tc;
    ctx.fillRect(-bw/2-6,-bh/4,6,bh/2.4+asw);
    ctx.fillRect(bw/2,-bh/4,6,bh/2.4-asw);
    ctx.fillStyle='#ffcba4';ctx.shadowColor='#ffcba4';ctx.shadowBlur=4;
    ctx.beginPath();ctx.roundRect(-bw/2+1,-bh/2-bw/2+2,bw-2,bw/2,5);ctx.fill();ctx.shadowBlur=0;
    const eY=-bh/2-bw/4+1;
    ctx.fillStyle='white';ctx.fillRect(-8,eY-4,7,7);ctx.fillRect(2,eY-4,7,7);
    ctx.fillStyle='#111';ctx.fillRect(-6,eY-2,4,4);ctx.fillRect(4,eY-2,4,4);
    ctx.fillStyle='white';ctx.fillRect(-5,eY-1,2,2);ctx.fillRect(5,eY-1,2,2);
    const dist=G?G.ts.wy-this.wy:999;
    if(dist>-30&&dist<80){
      ctx.fillStyle='#333';ctx.beginPath();ctx.arc(0,eY+8,4,Math.PI,0);ctx.fill();
      ctx.fillStyle='#74b9ff';ctx.beginPath();ctx.moveTo(10,eY-2);ctx.quadraticCurveTo(13,eY+2,10,eY+6);ctx.quadraticCurveTo(7,eY+2,10,eY-2);ctx.fill();
    }else{ctx.fillStyle='#333';ctx.beginPath();ctx.arc(0,eY+8,3,0,Math.PI);ctx.fill();}
    ctx.fillStyle='#1e40af';ctx.shadowColor='#3b5fc0';ctx.shadowBlur=4;
    ctx.fillRect(-bw/2+1,-bh/2-bw/2,bw-2,5);ctx.fillRect(-bw/2+4,-bh/2-bw/2-10,bw-8,10);ctx.shadowBlur=0;
    ctx.globalAlpha=1;ctx.restore();
    if(this.pwr){
      ctx.font=`${15*SCALE}px sans-serif`;ctx.textAlign='center';
      ctx.fillText(this.pwr==='speed'?'⚡':this.pwr==='jump'?'🦘':'🛡',(px+this.w/2)*SCALE,(py-7)*SCALE);
      ctx.textAlign='left';
    }
  }
};

// ── WORLD GEN ─────────────────────
let genTop=9999;
function genWorld(from,to){
  let y=from;
  while(y>to){
    y-=rnd(60,110);
    const pw=rnd(65,165),px=rnd(15,DW-pw-15);
    let type='normal';
    const depth=50-y;
    if(depth>200){const r=Math.random();if(r<.18)type='moving';else if(r<.26)type='spring';else if(r<.33)type='ice';else if(r<.39)type='crumble';}
    G.plats.push(new Plat(px,y,pw,type));
    if(Math.random()<.5){
      let gt='gem';const r=Math.random();
      if(r<.045)gt='pwr_speed';else if(r<.08)gt='pwr_jump';else if(r<.11)gt='pwr_shield';
      G.gems.push(new Gem(px+pw/2+rnd(-18,18),y-28,gt));
    }
  }
  genTop=Math.min(genTop,to);
}

// ── OVERLAYS ──────────────────────
let lastWarn=0;
function drawDangerFX(){
  const d=TS.danger(PL.wy),s=SCALE;
  if(d>.25){const a=(d-.25)/.75*.22,g2=ctx.createLinearGradient(0,H,0,H*.5);g2.addColorStop(0,`rgba(0,150,255,${a})`);g2.addColorStop(1,'transparent');ctx.fillStyle=g2;ctx.fillRect(0,0,W,H);}
  if(d>.65){const ea=(d-.65)/.35*.35*(0.5+0.5*Math.sin(performance.now()*.01)),eg=ctx.createRadialGradient(W/2,H/2,H*.15,W/2,H/2,H*.82);eg.addColorStop(0,'transparent');eg.addColorStop(1,`rgba(0,100,255,${ea})`);ctx.fillStyle=eg;ctx.fillRect(0,0,W,H);}
  const dist=PL.wy-TS.wy;
  if(dist<220&&dist>0){
    const now=performance.now();
    if(now-lastWarn>1100){snd('warn');lastWarn=now;}
    const u=1-dist/220;
    ctx.globalAlpha=u*(.7+.3*Math.sin(now*.009));
    ctx.fillStyle=dist<70?'#ff4757':'#ff9f43';
    ctx.font=`bold ${Math.round(lerp(14,22,u))*s}px Fredoka One,cursive`;
    ctx.textAlign='center';ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=10;
    const msgs=['⚠ MONTE! ⚠','🌊 ATTENTION!','⬆ GRIMPE VITE!','💨 COURS!'];
    ctx.fillText(dist<55?'🌊 ENGLOUTI! 🌊':msgs[Math.floor(now/580)%4],W/2,36*s);
    ctx.shadowBlur=0;ctx.textAlign='left';ctx.globalAlpha=1;
  }
}
function drawHeightBar(){
  const bx=DW-15,by=18,bh=DH-70,s=SCALE;
  ctx.globalAlpha=.28;ctx.fillStyle='#fff';ctx.fillRect(bx*s,by*s,5*s,bh*s);ctx.globalAlpha=1;
  const climb=Math.max(0,50-PL.wy),pct=clamp(climb/4000,0,1),my=by+bh*(1-pct);
  const hg=ctx.createLinearGradient(0,(by+bh)*s,0,my*s);hg.addColorStop(0,'#00ff88');hg.addColorStop(1,'#00ffff');
  ctx.globalAlpha=.45;ctx.fillStyle=hg;ctx.fillRect(bx*s,my*s,5*s,(bh-(my-by))*s);ctx.globalAlpha=1;
  ctx.fillStyle='#00ff88';ctx.shadowColor='#00ff88';ctx.shadowBlur=8;
  ctx.beginPath();ctx.arc((bx+2.5)*s,my*s,5.5*s,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  const tc=Math.max(0,50-TS.wy),tp=clamp(tc/4000,0,1),tmy=by+bh*(1-tp);
  ctx.fillStyle='#00c6ff';ctx.shadowColor='#00c6ff';ctx.shadowBlur=6;ctx.fillRect((bx-1)*s,tmy*s,7*s,3*s);ctx.shadowBlur=0;
}
function drawPwrBar(){
  if(!PL.pwr)return;
  const pct=PL.pwrT/280,bw=110,bh=5,bx=DW/2-55,by2=7,s=SCALE;
  ctx.fillStyle='rgba(0,0,0,.4)';ctx.beginPath();ctx.roundRect(bx*s,by2*s,bw*s,bh*s,3*s);ctx.fill();
  const col=PL.pwr==='speed'?'#ffff00':PL.pwr==='jump'?'#ff88ff':'#00ff88';
  ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=7;
  ctx.beginPath();ctx.roundRect(bx*s,by2*s,bw*pct*s,bh*s,3*s);ctx.fill();ctx.shadowBlur=0;
}

// ── INPUT ─────────────────────────
const keys={L:false,R:false};
let jumpHeld=false;
function onJump(){
  AC.resume();
  if(G.state==='menu'||G.state==='dead'){G.start();return;}
  if(G.state==='playing')PL.jump();
}
document.addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA')keys.L=true;
  if(e.code==='ArrowRight'||e.code==='KeyD')keys.R=true;
  if(['Space','ArrowUp','KeyW','KeyZ'].includes(e.code)&&!jumpHeld){jumpHeld=true;onJump();e.preventDefault();}
});
document.addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA')keys.L=false;
  if(e.code==='ArrowRight'||e.code==='KeyD')keys.R=false;
  if(['Space','ArrowUp','KeyW','KeyZ'].includes(e.code))jumpHeld=false;
});

// Touch controls
function setupTouch(el,onStart,onEnd){
  el.addEventListener('touchstart',e=>{onStart();e.preventDefault();},{passive:false});
  el.addEventListener('touchend',e=>{if(onEnd)onEnd();e.preventDefault();},{passive:false});
  el.addEventListener('touchcancel',e=>{if(onEnd)onEnd();},{passive:false});
}
setupTouch(document.getElementById('tLeft'),()=>keys.L=true,()=>keys.L=false);
setupTouch(document.getElementById('tRight'),()=>keys.R=true,()=>keys.R=false);
setupTouch(document.getElementById('tJump'),()=>onJump(),null);
// visual feedback
['tLeft','tRight','tJump'].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener('touchstart',()=>el.classList.add('active'),{passive:true});
  el.addEventListener('touchend',()=>el.classList.remove('active'),{passive:true});
  el.addEventListener('touchcancel',()=>el.classList.remove('active'),{passive:true});
});
// tap anywhere on canvas = jump (for menu/dead screens)
canvas.addEventListener('touchstart',e=>{
  // only trigger if not hitting a control button
  if(G.state!=='playing')onJump();
  e.preventDefault();
},{passive:false});

document.getElementById('mainBtn').addEventListener('click',()=>{AC.resume();G.start();});

// ── MAIN GAME ─────────────────────
const G={
  state:'menu',plats:[],gems:[],ts:TS,
  score:0,elapsed:0,best:0,maxClimb:0,gemsGot:0,
  raf:null,lastT:0,

  start(){
    resize();
    DH=DW*H/W;
    this.state='playing';
    this.score=0;this.elapsed=0;this.maxClimb=0;this.gemsGot=0;
    this.plats=[];this.gems=[];parts.length=0;
    genTop=9999;camY=0;
    PL.reset();TS.reset();
    const gY=PL.wy+PL.h;
    this.plats.push(new Plat(0,gY,DW,'normal'));
    this.plats.push(new Plat(180,gY-90,240,'normal'));
    camY=PL.wy-DH*.70;
    genWorld(gY,gY-4000);
    document.getElementById('overlay').classList.add('off');
    document.getElementById('pwrBadge').style.display='none';
    if(this.raf)cancelAnimationFrame(this.raf);
    this.lastT=performance.now();
    this.raf=requestAnimationFrame(t=>this.loop(t));
  },

  loop(now){
    const dt=clamp((now-this.lastT)/16.67,.1,3.5);
    this.lastT=now;
    if(this.state==='playing')this.update(dt);
    this.render();
    this.raf=requestAnimationFrame(t=>this.loop(t));
  },

  update(dt){
    this.elapsed+=dt/60;
    PL.update(dt);
    for(const p of this.plats)p.update(dt);
    this.plats=this.plats.filter(p=>!p.dead||p.wy<TS.wy+500);
    TS.update(dt,this.elapsed);
    // camera
    const tc=PL.wy-DH*.65;
    if(tc<camY)camY=lerp(camY,tc,.08*dt*3);
    // gen
    if(PL.wy<genTop+1200)genWorld(genTop,genTop-3500);
    // gems
    for(const gem of this.gems){
      if(gem.done)continue;gem.update();
      const dx=(PL.x+PL.w/2)-gem.sx,dy=sY(PL.wy+PL.h/2)-gem.sy_;
      if(Math.abs(dx)<22&&Math.abs(dy)<22){
        gem.done=true;this.gemsGot++;
        if(gem.type==='gem'){
          this.score+=100;spawnParts(gem.sx,gem.sy_,'#00d4ff',13,{up:2,mx:5,sz:5,life:35});snd('gem');
        }else{
          const pt=gem.type.replace('pwr_','');
          PL.pwr=pt;PL.pwrT=280;if(pt==='shield')PL.shielded=true;this.score+=200;
          const el=document.getElementById('pwrBadge');el.style.display='block';
          el.textContent=pt==='speed'?'VITESSE ⚡':pt==='jump'?'SUPER SAUT 🦘':'BOUCLIER 🛡';
          spawnParts(gem.sx,gem.sy_,pt==='speed'?'#ffff00':pt==='jump'?'#ff88ff':'#00ff88',20,{up:3,mx:6,sz:6,life:42});snd('pwr');
        }
      }
    }
    // score
    const climb=Math.max(0,50-PL.wy);
    this.maxClimb=Math.max(this.maxClimb,climb);
    this.score=Math.max(this.score,Math.floor(climb*.8)+this.gemsGot*100+Math.floor(this.elapsed*3));
    // death
    if(PL.wy+PL.h>=TS.wy&&PL.ifr<=0){
      if(PL.shielded){
        PL.shielded=false;PL.pwr=null;PL.ifr=130;TS.wy-=80;
        spawnParts(PL.x+PL.w/2,sY(PL.wy+PL.h),'#00ff88',24,{up:3,mx:7,sz:6,life:40});snd('pwr');
        document.getElementById('pwrBadge').style.display='none';
      }else{
        PL.lives--;
        if(PL.lives<=0){this.die();return;}
        PL.ifr=200;PL.wy=TS.wy-PL.h-80;PL.vy=-(JUMP_SPD*1.25);
        spawnParts(PL.x+PL.w/2,sY(PL.wy+PL.h),'#ff4757',22,{up:2,mx:6,sz:5,life:38});snd('die');
      }
    }
    // HUD
    document.getElementById('hs').textContent=Math.floor(this.score);
    document.getElementById('hh').textContent=Math.floor(climb/8)+'m';
    document.getElementById('ht').textContent=Math.floor(this.elapsed)+'s';
    document.getElementById('hlv').textContent='❤️'.repeat(Math.max(0,PL.lives))||'💀';
    document.getElementById('hb2').textContent=Math.floor(this.best);
    document.getElementById('dangerFill').style.width=(TS.danger(PL.wy)*100)+'%';
  },

  render(){
    ctx.clearRect(0,0,W,H);
    const climb=Math.max(0,50-PL.wy);
    DH=DW*H/W;
    drawBg(climb);
    for(const p of this.plats)p.draw();
    for(const g of this.gems)g.draw();
    tickParts();
    PL.draw();
    TS.draw();
    drawDangerFX();
    drawHeightBar();
    drawPwrBar();
  },

  die(){
    this.state='dead';snd('die');
    if(this.score>this.best)this.best=this.score;
    for(let i=0;i<55;i++)
      spawnParts(PL.x+PL.w/2,sY(PL.wy+PL.h/2),`hsl(${200+Math.random()*30},88%,${50+Math.random()*20}%)`,1,{mx:9,up:3,sz:8,life:58});
    setTimeout(()=>{
      const isRec=this.score>0&&this.score>=this.best;
      const climb=Math.max(0,50-PL.wy);
      const ov=document.getElementById('overlay');
      ov.classList.remove('off');
      ov.innerHTML=`
        <div class="oi">🌊💀</div>
        <div class="ot red">ENGLOUTI!</div>
        ${isRec?'<div class="rec">🏆 NOUVEAU RECORD!</div>':''}
        <div class="sg">
          <div class="sb"><div class="sl">Score</div><div class="sv" style="color:var(--gold)">${Math.floor(this.score)}</div></div>
          <div class="sb"><div class="sl">Meilleur</div><div class="sv" style="color:#c084fc">${Math.floor(this.best)}</div></div>
          <div class="sb"><div class="sl">Hauteur</div><div class="sv" style="color:var(--green)">${Math.floor(this.maxClimb/8)}m</div></div>
          <div class="sb"><div class="sl">Survie</div><div class="sv" style="color:#ff9f43">${Math.floor(this.elapsed)}s</div></div>
          <div class="sb"><div class="sl">Gemmes</div><div class="sv" style="color:#00d4ff">${this.gemsGot} 💎</div></div>
          <div class="sb"><div class="sl">Vies perdues</div><div class="sv" style="color:#ff6b6b">${3-Math.max(0,PL.lives)}/3</div></div>
        </div>
        <button class="btn br" id="retryBtn">🔄 &nbsp;REJOUER</button>
      `;
      document.getElementById('retryBtn').addEventListener('click',()=>{AC.resume();G.start();});
    },850);
  }
};

genBuildings();

// menu loop
(function menuLoop(){
  if(G.state!=='menu')return;
  resize();DH=DW*H/W;
  ctx.clearRect(0,0,W,H);drawBg(0);
  const t=performance.now()/600,s=SCALE;
  ctx.beginPath();ctx.moveTo(0,H*.78);
  for(let x=0;x<=DW;x+=5)ctx.lineTo(x*s,(DH*.78+Math.sin(x*.02+t)*18+Math.sin(x*.04-t*1.2)*9)*s);
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
  const mg=ctx.createLinearGradient(0,H*.75,0,H);
  mg.addColorStop(0,'rgba(0,200,255,.7)');mg.addColorStop(1,'rgba(0,40,160,.9)');
  ctx.fillStyle=mg;ctx.fill();
  requestAnimationFrame(menuLoop);
})();
</script>
